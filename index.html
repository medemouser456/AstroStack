<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->

    <!-- Music Player (fixed, always visible) -->

      <span id="music-label">🎵 Vishnu Sahasranamam</span>
      <input type="range" id="music-volume" min="0" max="100" value="20" />

      <audio id="bg-music" loop>
        <source src="/src/assets/sounds/vishnu.mp3" type="audio/mpeg" />
      </audio>
    </div>

    <!-- App Root -->
    <div id="app"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.js"></script>
